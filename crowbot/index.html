:root {
  --bg: #0d1117; --card: #161b22; --card-hover: #1c2129; --border: #30363d;
  --text: #e6edf3; --dim: #8b949e; --bright: #f0f6fc;
  --purple: #a371f7; --purple-bg: rgba(163,113,247,0.15);
  --blue: #58a6ff; --blue-bg: rgba(88,166,255,0.15);
  --green: #3fb950; --green-bg: rgba(63,185,80,0.15);
  --orange: #f0883e; --orange-bg: rgba(240,136,62,0.15);
  --red: #f85149; --red-bg: rgba(248,81,73,0.12);
  --gray: #8b949e; --gray-bg: rgba(139,148,158,0.15);
  --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; min-height:100vh; }
#app { max-width:1200px; margin:0 auto; padding:1rem; }

/* Header */
.header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:0.75rem; padding:0.75rem 0; border-bottom:1px solid var(--border); margin-bottom:1.25rem; }
.header h1 { font-size:1.5rem; color:var(--bright); font-weight:700; letter-spacing:-0.5px; cursor:pointer; }
.header h1:hover { color:var(--purple); }
.meta-line { font-size:0.75rem; color:var(--dim); }
.freshness { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.fresh { background:var(--green); }

/* Nav */
.nav-bar { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.25rem; }
.nav-btn { padding:0.4rem 0.85rem; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--dim); font-size:0.8rem; cursor:pointer; transition:all 0.15s; font-weight:500; }
.nav-btn:hover { border-color:var(--dim); color:var(--text); }
.nav-btn.active { border-color:var(--purple); color:var(--purple); background:var(--purple-bg); }
.nav-btn.risk { border-color:var(--red); color:var(--red); }
.nav-btn.risk.active { background:var(--red-bg); }

/* Breadcrumbs */
.breadcrumb { font-size:0.8rem; color:var(--dim); margin-bottom:1rem; }
.breadcrumb a { color:var(--blue); text-decoration:none; cursor:pointer; }
.breadcrumb a:hover { text-decoration:underline; }
.breadcrumb .sep { margin:0 0.4rem; }

/* Search */
.search-wrap { position:relative; flex:1; min-width:180px; max-width:350px; }
.search-wrap input { width:100%; padding:0.4rem 0.75rem 0.4rem 2rem; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:0.85rem; outline:none; }
.search-wrap input:focus { border-color:var(--purple); }
.search-wrap::before { content:'🔍'; position:absolute; left:0.6rem; top:50%; transform:translateY(-50%); font-size:0.75rem; }
.search-results { position:absolute; top:100%; left:0; right:0; background:var(--card); border:1px solid var(--border); border-radius:8px; margin-top:4px; z-index:100; max-height:300px; overflow-y:auto; display:none; }
.search-results.show { display:block; }
.search-item { padding:0.5rem 0.75rem; cursor:pointer; font-size:0.85rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.5rem; }
.search-item:hover { background:var(--card-hover); }
.search-item:last-child { border-bottom:none; }
.search-tag { font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:4px; font-weight:600; text-transform:uppercase; }

/* Grid */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:1.25rem; }
.grid-3 { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1rem; }

/* Cards */
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; display:flex; flex-direction:column; gap:0.65rem; transition:all 0.15s; cursor:pointer; position:relative; }
.card:hover { border-color:var(--dim); background:var(--card-hover); }
.card-header { display:flex; align-items:center; gap:0.65rem; }
.card-emoji { font-size:1.5rem; line-height:1; flex-shrink:0; width:2rem; text-align:center; }
.card-title { font-size:1.05rem; font-weight:600; color:var(--bright); }
.card-sub { font-size:0.8rem; color:var(--dim); margin-top:0.1rem; }
.card-body { font-size:0.85rem; color:var(--dim); }
.card-count { font-size:2rem; font-weight:700; color:var(--bright); }
.card-domain { border-left:3px solid; padding-left:1rem; }

/* Status dot */
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:0.5rem; flex-shrink:0; }
.dot-green { background:var(--green); }
.dot-amber { background:var(--orange); }
.dot-red { background:var(--red); }
.dot-gray { background:#484f58; }

/* Badges */
.badge { display:inline-block; padding:0.15rem 0.5rem; border-radius:10px; font-size:0.72rem; font-weight:600; white-space:nowrap; }
.b-purple { background:var(--purple-bg); color:var(--purple); }
.b-blue { background:var(--blue-bg); color:var(--blue); }
.b-green { background:var(--green-bg); color:var(--green); }
.b-orange { background:var(--orange-bg); color:var(--orange); }
.b-red { background:var(--red-bg); color:var(--red); }
.b-gray { background:var(--gray-bg); color:var(--gray); }
.risk-badge { font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:4px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }

/* Meta badges (sandbox, heartbeat) */
.meta-badges { display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:auto; }
.meta-badge { display:inline-flex; align-items:center; gap:0.25rem; padding:0.15rem 0.45rem; border-radius:6px; font-size:0.68rem; font-weight:500; border:1px solid var(--border); color:var(--dim); }
.meta-badge.sb-off { border-color:var(--green); color:var(--green); }
.meta-badge.sb-docker { border-color:var(--orange); color:var(--orange); }
.meta-badge.sb-restricted { border-color:var(--red); color:var(--red); }
.meta-badge.hb { border-color:var(--purple); color:var(--purple); }

/* Model display */
.model-line { display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
.model-name { font-family:var(--mono); font-size:0.82rem; font-weight:500; }
.fallback-item { font-size:0.78rem; color:var(--dim); font-family:var(--mono); padding-left:0.5rem; border-left:2px solid var(--border); }

/* Tables */
.table-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
table { width:100%; border-collapse:collapse; font-size:0.85rem; }
th { text-align:left; padding:0.6rem 0.75rem; border-bottom:2px solid var(--border); color:var(--dim); font-weight:600; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px; }
td { padding:0.5rem 0.75rem; border-bottom:1px solid var(--border); }
tr:last-child td { border-bottom:none; }
td.mono { font-family:var(--mono); font-size:0.8rem; }

/* Detail view */
.detail { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.5rem; }
.detail h2 { font-size:1.3rem; color:var(--bright); margin-bottom:0.25rem; }
.detail h3 { font-size:0.95rem; color:var(--bright); margin:1.25rem 0 0.5rem; padding-bottom:0.3rem; border-bottom:1px solid var(--border); }
.detail-role { color:var(--dim); font-size:0.9rem; margin-bottom:1rem; }
.kv { display:flex; gap:0.5rem; padding:0.35rem 0; font-size:0.85rem; }
.kv-label { color:var(--dim); min-width:140px; flex-shrink:0; font-weight:500; }
.kv-value { color:var(--text); }
.kv-value.mono { font-family:var(--mono); font-size:0.82rem; }

/* Timeline */
.timeline { position:relative; padding-left:2.5rem; }
.timeline::before { content:''; position:absolute; left:1rem; top:0; bottom:0; width:2px; background:var(--border); }
.tl-item { position:relative; padding:0.5rem 0 0.5rem 1rem; }
.tl-item::before { content:''; position:absolute; left:-1.55rem; top:0.75rem; width:10px; height:10px; border-radius:50%; border:2px solid var(--border); background:var(--bg); }
.tl-item.oracle::before { border-color:var(--purple); background:var(--purple-bg); }
.tl-item.ops::before { border-color:var(--blue); background:var(--blue-bg); }
.tl-item.researcher::before { border-color:var(--green); background:var(--green-bg); }
.tl-time { font-size:0.75rem; color:var(--dim); font-family:var(--mono); }
.tl-name { font-size:0.9rem; font-weight:500; color:var(--bright); }
.tl-desc { font-size:0.78rem; color:var(--dim); }

/* Risk view */
.risk-cols { display:grid; grid-template-columns:repeat(3, 1fr); gap:1rem; }
.risk-col { background:var(--card); border-radius:10px; padding:1rem; border:1px solid var(--border); }
.risk-col h3 { font-size:0.85rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.75rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); }
.risk-col.spof h3 { color:var(--red); border-bottom-color:var(--red); }
.risk-col.degraded h3 { color:var(--orange); border-bottom-color:var(--orange); }
.risk-col.robust h3 { color:var(--green); border-bottom-color:var(--green); }
.risk-item { padding:0.4rem 0; font-size:0.85rem; border-bottom:1px solid var(--border); }
.risk-item:last-child { border-bottom:none; }
.risk-item .label { font-weight:500; color:var(--bright); }
.risk-item .note { font-size:0.78rem; color:var(--dim); margin-top:0.15rem; }

/* Cascade */
.cascade { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1rem; margin-top:1rem; }
.cascade-header { display:flex; align-items:center; gap:0.5rem; cursor:pointer; }
.cascade-header h4 { font-size:0.9rem; color:var(--bright); }
.cascade-body { display:none; padding-top:0.75rem; }
.cascade.open .cascade-body { display:block; }
.cascade-arrow { transition:transform 0.2s; color:var(--dim); }
.cascade.open .cascade-arrow { transform:rotate(90deg); }
.impact-list { list-style:none; padding-left:0; }
.impact-list li { padding:0.25rem 0; font-size:0.85rem; color:var(--dim); }
.impact-list li::before { content:'→ '; color:var(--orange); }

/* Graph */
#graph-container { width:100%; height:500px; background:var(--card); border:1px solid var(--border); border-radius:10px; }
.graph-fallback { padding:2rem; text-align:center; color:var(--dim); }

/* Section headers */
.section-header { display:flex; align-items:center; gap:0.5rem; margin:1.5rem 0 1rem; }
.section-header h2 { font-size:1.15rem; color:var(--bright); font-weight:600; }

/* Responsive */
@media (max-width:768px) {

  .header h1 { font-size:1.25rem; }
  .grid { grid-template-columns:1fr; }
  .grid-3 { grid-template-columns:1fr; }
  .risk-cols { grid-template-columns:1fr; }
  .kv { flex-direction:column; gap:0.15rem; }
  .kv-label { min-width:auto; }
  .search-wrap { max-width:100%; }
  #graph-container { height:350px; }
}

let state = { view: 'hub', domain: null, component: null, riskView: false };

// === HELPERS ===
const $ = s => document.querySelector(s);
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
};

function providerColor(p) {
  const m = { anthropic:'purple', 'openai-codex':'green', 'github-copilot':'blue', lmstudio:'gray' };
  return m[p] || 'gray';
}
function providerBadge(p) {
  return h('span', {class:'badge b-' + providerColor(p)}, p);
}
function sandboxBadge(mode) {
  if (mode === 'off') return h('span', {class:'meta-badge sb-off'}, 'sandbox: off');
  if (mode === 'non-main') return h('span', {class:'meta-badge sb-restricted'}, 'sandbox: isolated');
  if (mode === 'default') return h('span', {class:'meta-badge sb-docker'}, 'sandbox: docker');
  return h('span', {class:'meta-badge'}, 'sandbox: ' + mode);
}
function statusDot(status) {
  const cls = status === 'active' || status === 'up' || status === 'ok' ? 'dot-green' :
              status === 'degraded' || status === 'warn' ? 'dot-amber' :
              status === 'down' || status === 'failed' ? 'dot-red' : 'dot-gray';
  return h('span', {class:'dot ' + cls});
}
function navigate(view, domain, component) {
  state = { view, domain, component, riskView: view === 'risk' };
  history.pushState(state, '', '#' + view + (domain ? '/' + domain : '') + (component ? '/' + component : ''));
  render();
}

// === SEARCH ===
function buildSearchIndex() {
  const items = [];
  D.agents.forEach(a => items.push({ type:'Agent', name:a.id, emoji:a.emoji, nav:() => navigate('detail','agents',a.id) }));
  D.automation.cronJobs.forEach(c => items.push({ type:'Cron', name:c.name, emoji:'⏰', nav:() => navigate('detail','automation',c.name) }));
  D.infrastructure.services.forEach(s => items.push({ type:'Service', name:s.name, emoji:'⚙️', nav:() => navigate('detail','infrastructure',s.name) }));
  D.infrastructure.providers.forEach(p => items.push({ type:'Provider', name:p.name, emoji:'🔌', nav:() => navigate('detail','infrastructure','prov-'+p.name) }));
  D.communication.channels.forEach(ch => items.push({ type:'Channel', name:ch.name, emoji:'💬', nav:() => navigate('domain','communication',null) }));
  return items;
}
const searchIndex = buildSearchIndex();

function renderHeader() {

  return h('div', {class:'header'},
    h('h1', {onclick:() => navigate('hub',null,null)}, '🐦⬛ Crowbot Fleet'),
    h('div', {class:'search-wrap'},
      h('input', {type:'text', placeholder:'Search agents, services, cron...', oninput: onSearch, onfocus: onSearch, onblur: e => setTimeout(()=>$('.search-results')&&($('.search-results').className='search-results'),200) }),
      h('div', {class:'search-results'})
    ),
    h('div', {class:'meta-line'},
      h('span', {class:'freshness fresh'}),
      'Generated: ' + meta.generated + ' • OpenClaw ' + meta.version
    )
  );
}

function onSearch(e) {
  const q = e.target.value.toLowerCase();
  const results = $('.search-results');
  if (!q) { results.className = 'search-results'; return; }
  const matches = searchIndex.filter(i => i.name.toLowerCase().includes(q)).slice(0, 8);
  results.innerHTML = '';
  if (matches.length === 0) {
    results.appendChild(h('div', {class:'search-item', style:'color:var(--dim)'}, 'No results'));
  }
  matches.forEach(m => {
    const tagColor = { Agent:'b-purple', Cron:'b-orange', Service:'b-blue', Provider:'b-green', Channel:'b-gray' }[m.type] || 'b-gray';
    results.appendChild(h('div', {class:'search-item', onclick:() => { m.nav(); e.target.value=''; results.className='search-results'; } },
      h('span', {class:'search-tag badge ' + tagColor}, m.type),
      m.emoji + ' ' + m.name
    ));
  });
  results.className = 'search-results show';
}

function renderNav() {
  const views = [
    ['hub', '🏠 Hub'],
    ['agents', '🤖 Agents'],
    ['infrastructure', '⚙️ Infrastructure'],
    ['automation', '⏰ Automation'],
    ['communication', '💬 Communication'],
    ['security', '🔒 Security'],
    ['memory', '🧠 Memory'],
    ['graph', '🕸️ System Map'],
    ['risk', '⚠️ Risk'],
  ];
  return h('nav', {class:'nav-bar'}, ...views.map(([id, label]) => {
    const isActive = (state.view === id) || (state.view === 'domain' && state.domain === id) || (state.view === 'detail' && state.domain === id);
    const cls = 'nav-btn' + (isActive ? ' active' : '') + (id === 'risk' ? ' risk' : '');
    return h('button', {class:cls, onclick:() => {
      if (id === 'hub') navigate('hub',null,null);
      else if (id === 'graph' || id === 'risk') navigate(id,null,null);
      else navigate('domain',id,null);
    } }, label);
  }));
}

function renderBreadcrumb() {
  if (state.view === 'hub') return h('div');
  const crumbs = [h('a', {onclick:() => navigate('hub',null,null)}, 'Hub')];
  if (state.domain) {
    crumbs.push(h('span', {class:'sep'}, '›'));
    crumbs.push(h('a', {onclick:() => navigate('domain',state.domain,null)}, state.domain.charAt(0).toUpperCase() + state.domain.slice(1)));
  }
  if (state.component) {
    crumbs.push(h('span', {class:'sep'}, '›'));
    crumbs.push(h('span', null, state.component));
  }
  return h('div', {class:'breadcrumb'}, ...crumbs);
}

// === SYSTEM MAP (Cytoscape.js) ===
function renderGraphView() {
  if (window.__cyFailed || typeof cytoscape === 'undefined') {
    return h('div', {class:'graph-fallback'},
      h('p', null, 'System Map requires internet (Cytoscape.js CDN).'),
      h('p', null, 'Use the Hub and domain views for full system details.')
    );
  }
  const container = h('div', {id:'graph-container'});
  setTimeout(() => initGraph(container), 50);
  return h('div', null,
    h('div', {style:'font-size:0.8rem;color:var(--dim);margin-bottom:0.5rem'}, 'Click nodes to explore. Drag to rearrange. Scroll to zoom.'),
    container
  );
}

function initGraph(container) {
  if (!container || !container.offsetHeight) return;
  try {
    if (typeof cytoscapeDagre !== 'undefined') cytoscape.use(cytoscapeDagre);
  } catch(e) {}

  const nodes = [];
  const edges = [];

  // Agent nodes
  D.agents.forEach(a => {
    nodes.push({ data: { id: a.id, label: a.emoji + ' ' + a.id, type: 'agent', tier: a.tier, parent: 'fleet' } });
  });
  // Group nodes
  nodes.push({ data: { id: 'fleet', label: 'Fleet Agents' } });
  nodes.push({ data: { id: 'infra', label: 'Infrastructure' } });
  nodes.push({ data: { id: 'providers', label: 'Providers' } });

  // Infrastructure nodes
  nodes.push({ data: { id: 'gateway', label: '⚙️ Gateway', type: 'service', parent: 'infra' } });
  nodes.push({ data: { id: 'qdrant', label: '💾 Qdrant', type: 'service', parent: 'infra' } });
  nodes.push({ data: { id: 'lmstudio-svc', label: '🧠 LM Studio', type: 'service', parent: 'infra' } });
  nodes.push({ data: { id: 'guardian', label: '🛡️ Config Guardian', type: 'service', parent: 'infra' } });

  // Provider nodes
  D.infrastructure.providers.forEach(p => {
    nodes.push({ data: { id: 'prov-' + p.name, label: p.name, type: 'provider', parent: 'providers' } });
  });

  // Edges: agents -> gateway
  D.agents.forEach(a => {
    edges.push({ data: { source: a.id, target: 'gateway', label: 'routes through' } });
  });

  // Edges: delegation
  edges.push({ data: { source: 'main', target: 'coder', label: 'delegates' } });
  edges.push({ data: { source: 'main', target: 'oracle', label: 'delegates' } });
  edges.push({ data: { source: 'main', target: 'researcher', label: 'delegates' } });
  edges.push({ data: { source: 'main', target: 'ops', label: 'delegates' } });
  edges.push({ data: { source: 'main', target: 'scribe', label: 'delegates' } });
  edges.push({ data: { source: 'oracle', target: 'researcher', label: 'dispatches' } });

  // Edges: memory
  edges.push({ data: { source: 'qdrant', target: 'lmstudio-svc', label: 'embeddings' } });

  // Edges: providers
  D.agents.forEach(a => {
    const provId = 'prov-' + { anthropic:'Anthropic', 'openai-codex':'OpenAI Codex', 'github-copilot':'GitHub Copilot' }[a.model.primary.provider];
    if (provId) edges.push({ data: { source: a.id, target: provId, label: 'primary model' } });
  });

  const cy = cytoscape({
    container: container,
    elements: { nodes, edges },
    style: [
      { selector: 'node', style: {
        'label': 'data(label)', 'text-valign': 'center', 'text-halign': 'center',
        'font-size': '10px', 'color': '#e6edf3', 'text-wrap': 'wrap',
        'background-color': '#161b22', 'border-width': 2, 'border-color': '#30363d',
        'width': 50, 'height': 50, 'shape': 'round-rectangle',
      } },
      { selector: 'node[type="agent"]', style: {
        'background-color': '#1c2129', 'border-color': '#a371f7', 'width': 60, 'height': 40,
      } },
      { selector: 'node[tier="conditional"]', style: { 'border-color': '#484f58', 'opacity': 0.7 } },
      { selector: 'node[type="service"]', style: { 'background-color': '#1c2129', 'border-color': '#58a6ff', 'shape': 'round-rectangle' } },
      { selector: 'node[type="provider"]', style: { 'background-color': '#1c2129', 'border-color': '#3fb950', 'shape': 'ellipse' } },
      { selector: ':parent', style: {
        'background-color': '#0d1117', 'border-color': '#30363d', 'border-width': 1,
        'text-valign': 'top', 'text-halign': 'center', 'font-size': '12px', 'color': '#8b949e',
        'padding': '20px',
      } },
      { selector: 'edge', style: {
        'width': 1, 'line-color': '#30363d', 'target-arrow-color': '#30363d',
        'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'opacity': 0.5,
        'font-size': '8px', 'color': '#8b949e',
      } },
      { selector: 'edge[label="delegates"]', style: { 'line-color': '#a371f7', 'target-arrow-color': '#a371f7', 'opacity': 0.8, 'width': 2 } },
      { selector: 'edge[label="dispatches"]', style: { 'line-color': '#f0883e', 'target-arrow-color': '#f0883e', 'opacity': 0.7 } },
      { selector: 'edge[label="embeddings"]', style: { 'line-color': '#3fb950', 'target-arrow-color': '#3fb950' } },
      { selector: 'node:selected', style: { 'border-color': '#f0f6fc', 'border-width': 3 } },
    ],
    layout: { name: typeof dagre !== 'undefined' ? 'dagre' : 'cose', rankDir: 'TB', nodeSep: 30, rankSep: 60, padding: 20 },
    minZoom: 0.3, maxZoom: 3,
  });

  cy.on('tap', 'node[type="agent"]', function(evt) {
    navigate('detail', 'agents', evt.target.id());
  });
}

// === MAIN RENDER ===
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(renderHeader());
  app.appendChild(renderNav());
  app.appendChild(renderBreadcrumb());

  let content;
  switch(state.view) {
    case 'hub': content = renderHub(); break;
    case 'domain':
      switch(state.domain) {
        case 'agents': content = renderAgentsDomain(); break;
        case 'infrastructure': content = renderInfrastructureDomain(); break;
        case 'automation': content = renderAutomationDomain(); break;
        case 'communication': content = renderCommunicationDomain(); break;
        case 'security': content = renderSecurityDomain(); break;
        case 'memory': content = renderMemoryDomain(); break;
        default: content = renderHub();
      }
      break;
    case 'detail':
      if (state.domain === 'agents') content = renderAgentDetail(state.component);
      else content = h('div', null, 'Detail view for ' + state.component);
      break;
    case 'graph': content = renderGraphView(); break;
    case 'risk': content = renderRiskView(); break;
    default: content = renderHub();
  }
  app.appendChild(content);
}

// === INIT ===
window.addEventListener('popstate', function(e) {
  if (e.state) { state = e.state; render(); }
  else { state = { view:'hub', domain:null, component:null, riskView:false }; render(); }
});

// Parse hash on load
const hash = location.hash.replace('#','').split('/');
if (hash[0] && hash[0] !== '') {
  state.view = hash[0];
  state.domain = hash[1] || null;
  state.component = hash[2] || null;
}
render();
</script>
</body>
</html>
